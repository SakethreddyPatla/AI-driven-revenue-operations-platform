version: 2

models:
  - name: dim_customers
    description: >
      One row per customer. Contains demographic attributes and
      derived fields like age_band. Primary input for customer
      segmentation and the ML propensity model.
    columns:
      - name: user_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: full_name
        description: "Concatenated first and last name"
        tests:
          - not_null
      - name: age_band
        description: "Derived age bucket for segmentation"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Under 18', '18-24', '25-34', '35-44',
                       '45-54', '55+', 'Unknown']
      - name: email
        description: "Customer email"
        tests:
          - not_null

  - name: dim_products
    description: >
      One row per product. Contains catalog attributes and
      pre-calculated margin metrics.
    columns:
      - name: product_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: product_retail_price_usd
        description: "Retail price must be positive"
        tests:
          - not_null

  - name: dim_dates
    description: >
      Date spine from 2019-01-01 to 2026-12-31. One row per
      calendar date with year, quarter, month, and week breakdowns.
    columns:
      - name: date_id
        description: "Primary key - integer in YYYYMMDD format"
        tests:
          - unique
          - not_null
      - name: quarter_label
        description: "Human readable quarter e.g. Q1 2022"
        tests:
          - not_null

  - name: dim_order_items
    description: >
      One row per order line item enriched with inventory cost
      data to enable margin calculations.
    columns:
      - name: order_item_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: order_id
        description: "Foreign key to fct_orders"
        tests:
          - not_null

  - name: fct_orders
    description: >
      Core fact table. One row per order with aggregated metrics
      including revenue, margin, and return flags. Central table
      for all revenue reporting and ML feature engineering.
    columns:
      - name: order_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: user_id
        description: "Foreign key to dim_customers"
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: user_id
      - name: date_id
        description: "Foreign key to dim_dates"
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_id
      - name: order_revenue_usd
        description: "Total revenue for the order"
        tests:
          - not_null
          - not_negative
      - name: order_status
        description: "Order status"
        tests:
          - accepted_values:
              arguments:
                values: ['Complete', 'Cancelled', 'Returned',
                       'Processing', 'Shipped']

  - name: ml_customer_features
    description: >
      Feature store for the propensity to purchase BQML model.
      One row per customer with RFM features computed over the
      observation window. Temporal split prevents data leakage.
    columns:
      - name: user_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: purchased_in_next_30_days
        description: "Binary label - target variable for BQML"
        tests:
          - not_null

  - name: fct_customer_propensity_scores
    description: >
      BQML model output. One row per customer with purchase
      probability score and propensity segment for marketing use.
    columns:
      - name: user_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: propensity_segment
        description: "Marketing segment based on probability"
        tests:
          - accepted_values:
              arguments:
                values: ['High Propensity', 'Medium Propensity',
                       'Low Propensity']