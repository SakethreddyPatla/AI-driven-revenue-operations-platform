name: dbt CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dbt-test:
    name: Run dbt Tests
    runs-on: ubuntu-latest

  
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          pip install dbt-core dbt-bigquery

      # 2. CHANGED: Swapped credentials_json for Workload Identity parameters
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          
          workload_identity_provider: 'projects/923250762788/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'dbt-cicd-runner@vernal-dispatch-496019-v9.iam.gserviceaccount.com'

      
      - name: Set up dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          revenue_ops:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: oauth
                project: vernal-dispatch-496019-v9
                dataset: revenue_ops_ci
                threads: 4
                timeout_seconds: 300
                location: US
          EOF

      - name: dbt deps
        run: dbt deps

      - name: dbt build (compile + run + test)
        run: dbt build --select staging marts.core
        working-directory: .

      - name: dbt docs generate
        run: dbt docs generate

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: target/